---
# ============================================
# Playbook: Bootstrap EKS Cluster (Post-Terraform)
# ============================================
# Orchestrates all cluster setup scripts in correct order
# Replaces: manually running scripts 01-07 one by one
#
# Usage:
#   ansible-playbook playbooks/bootstrap-cluster.yml
#
# Prerequisites:
#   - Terraform apply completed (EKS cluster exists)
#   - kubectl configured (aws eks update-kubeconfig)
#   - helm available locally
#
# ============================================

- name: Bootstrap EKS Cluster - Install All Components
  hosts: localhost
  connection: local
  gather_facts: no

  vars:
    project_root: "{{ playbook_dir }}/../.."
    kubectl: "kubectl"
    helm: "helm"
    cluster_name: "expense-dev"
    aws_region: "us-east-1"
    jenkins_namespace: "jenkins"
    argocd_namespace: "argocd"
    monitoring_namespace: "monitoring"
    sonarqube_namespace: "sonarqube"

  tasks:
    # ==========================================
    # Step 1: Verify Cluster Connectivity
    # ==========================================
    - name: Verify kubectl can reach the cluster
      command: "{{ kubectl }} get nodes"
      register: cluster_check
      failed_when: cluster_check.rc != 0
      changed_when: false

    - name: Display cluster nodes
      debug:
        msg: "{{ cluster_check.stdout_lines }}"

    # ==========================================
    # Step 2: Create Namespaces
    # ==========================================
    - name: Create required namespaces
      command: >
        {{ kubectl }} create namespace {{ item }} --dry-run=client -o yaml |
        {{ kubectl }} apply -f -
      loop:
        - "{{ jenkins_namespace }}"
        - "{{ argocd_namespace }}"
        - "{{ monitoring_namespace }}"
        - "{{ sonarqube_namespace }}"
        - order-service
        - payment-service
        - user-service
        - argo-rollouts
      changed_when: true

    # ==========================================
    # Step 3: Create Secrets (BEFORE Helm installs)
    # ==========================================
    - name: Create Jenkins admin secret
      command: >
        {{ kubectl }} create secret generic jenkins-admin-secret
        --from-literal=jenkins-admin-user=admin
        --from-literal=jenkins-admin-password={{ jenkins_admin_password | default('changeme') }}
        -n {{ jenkins_namespace }} --dry-run=client -o yaml |
        {{ kubectl }} apply -f -
      changed_when: true

    - name: Create Grafana admin secret
      command: >
        {{ kubectl }} create secret generic grafana-admin-secret
        --from-literal=admin-user=admin
        --from-literal=admin-password={{ grafana_admin_password | default('changeme') }}
        -n {{ monitoring_namespace }} --dry-run=client -o yaml |
        {{ kubectl }} apply -f -
      changed_when: true

    # ==========================================
    # Step 4: Install AWS Load Balancer Controller
    # ==========================================
    - name: Run ALB Controller install script
      command: bash {{ project_root }}/scripts/02-install-alb-controller.sh
      register: alb_result
      changed_when: true

    - name: Wait for ALB Controller pods
      command: >
        {{ kubectl }} wait --for=condition=Ready pods
        -l app.kubernetes.io/name=aws-load-balancer-controller
        -n kube-system --timeout=120s
      retries: 3
      delay: 10

    # ==========================================
    # Step 5: Install Jenkins
    # ==========================================
    - name: Run Jenkins install script
      command: bash {{ project_root }}/scripts/03-install-jenkins.sh
      register: jenkins_result
      changed_when: true

    - name: Wait for Jenkins StatefulSet to be ready
      command: >
        {{ kubectl }} rollout status statefulset/jenkins
        -n {{ jenkins_namespace }} --timeout=300s
      retries: 2
      delay: 30
      ignore_errors: yes

    # ==========================================
    # Step 6: Install ArgoCD
    # ==========================================
    - name: Run ArgoCD install script
      command: bash {{ project_root }}/scripts/04-install-argocd.sh
      register: argocd_result
      changed_when: true

    - name: Wait for ArgoCD server to be ready
      command: >
        {{ kubectl }} wait --for=condition=Ready pods
        -l app.kubernetes.io/name=argocd-server
        -n {{ argocd_namespace }} --timeout=180s
      retries: 2
      delay: 15

    # ==========================================
    # Step 7: Install Monitoring (Prometheus + Grafana)
    # ==========================================
    - name: Run Monitoring install script
      command: bash {{ project_root }}/scripts/05-install-monitoring.sh
      register: monitoring_result
      changed_when: true

    - name: Wait for Prometheus pods
      command: >
        {{ kubectl }} wait --for=condition=Ready pods
        -l app.kubernetes.io/name=prometheus
        -n {{ monitoring_namespace }} --timeout=180s
      retries: 2
      delay: 15
      ignore_errors: yes

    # ==========================================
    # Step 8: Install SonarQube
    # ==========================================
    - name: Run SonarQube install script
      command: bash {{ project_root }}/scripts/06-install-sonarqube.sh
      register: sonarqube_result
      changed_when: true
      ignore_errors: yes

    # ==========================================
    # Step 9: Install Argo Rollouts
    # ==========================================
    - name: Run Argo Rollouts install script
      command: bash {{ project_root }}/scripts/07-install-argo-rollouts.sh
      register: rollouts_result
      changed_when: true

    # ==========================================
    # Step 10: Apply Ingress Resources
    # ==========================================
    - name: Apply all ingress manifests
      command: "{{ kubectl }} apply -f {{ project_root }}/kubernetes/ingress/"
      changed_when: true

    - name: Apply ArgoCD ingress
      command: "{{ kubectl }} apply -f {{ project_root }}/kubernetes/argocd/argocd-ingress.yaml"
      changed_when: true

    # ==========================================
    # Step 11: Apply ArgoCD Applications
    # ==========================================
    - name: Apply ArgoCD Application CRDs
      command: "{{ kubectl }} apply -f {{ project_root }}/kubernetes/argocd/apps/"
      changed_when: true

    # ==========================================
    # Step 12: Final Verification
    # ==========================================
    - name: Get all pods across cluster
      command: "{{ kubectl }} get pods -A"
      register: all_pods
      changed_when: false

    - name: Display all pods
      debug:
        msg: "{{ all_pods.stdout_lines }}"

    - name: Get all ingresses
      command: "{{ kubectl }} get ingress -A"
      register: all_ingress
      changed_when: false

    - name: Display ingresses
      debug:
        msg: "{{ all_ingress.stdout_lines }}"

    - name: Bootstrap complete
      debug:
        msg: |
          ✅ CLUSTER BOOTSTRAP COMPLETE!
          ================================================
          Jenkins:    https://jenkins.{{ domain_name | default('vosukula.online') }}
          ArgoCD:     https://argocd.{{ domain_name | default('vosukula.online') }}
          Grafana:    https://grafana.{{ domain_name | default('vosukula.online') }}
          SonarQube:  https://sonar.{{ domain_name | default('vosukula.online') }}
          ================================================
          Next steps:
          1. Update Route53 CNAME records for each subdomain
          2. Connect Jenkins agent (setup-jenkins-agent playbook)
          3. Run first pipeline build
