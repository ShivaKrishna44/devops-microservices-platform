apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: jenkins-ingress
  namespace: jenkins
  annotations:
    kubernetes.io/ingress.class: alb
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTP": 80}, {"HTTPS": 443}]'
    alb.ingress.kubernetes.io/ssl-redirect: "443"
    alb.ingress.kubernetes.io/certificate-arn: "arn:aws:acm:us-east-1:589389425618:certificate/7c22798a-e5f0-49dd-9533-4cc0f5659027"
    alb.ingress.kubernetes.io/healthcheck-path: /login
    alb.ingress.kubernetes.io/backend-protocol: HTTP
spec:
  ingressClassName: alb
  rules:
  - host: jenkins.vosukula.online
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: jenkins
            port:
              number: 8080

#One manual step required before deploying: 
#Replace REPLACE_WITH_ACM_CERT_ARN in jenkins-ingress.yaml, 
#argocd-ingress.yaml, and grafana-ingress.yaml with your actual 
#AWS ACM certificate ARN. Also create the jenkins-admin-secret and 
#grafana-admin-secret Kubernetes secrets before running 
#the install scripts.