# SonarQube Community Build Helm Values
# Chart: sonarqube/sonarqube

# Required: Use Community edition (free)
community:
  enabled: true

monitoringPasscode: "define_it"

persistence:
  enabled: true
  storageClass: gp2
  size: 10Gi

resources:
  requests:
    cpu: 400m
    memory: 2Gi
  limits:
    cpu: 2000m
    memory: 4Gi
